<main class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 space-y-6 md:space-y-8">
  <section>
    <h2 class="text-base sm:text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">
      Quick Stats
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
      <button
        type="button"
        (click)="router.navigate(['/client/bookings'], { queryParams: { tab: 'active' } })"
        class="text-left bg-white dark:bg-gray-800/50 rounded-xl p-4 sm:p-5 border border-gray-200 dark:border-gray-700 flex items-start gap-3 sm:gap-4 hover:shadow-md hover:-translate-y-0.5 transition-all"
      >
        <div class="p-2 sm:p-3 rounded-full bg-primary/10 text-primary flex-shrink-0">
          <span class="material-symbols-outlined text-lg sm:text-xl">work</span>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">
            Active Bookings
          </p>
          <p class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">
            {{ loading ? '...' : stats.active }}
          </p>
        </div>
      </button>
      <button
        type="button"
        (click)="router.navigate(['/client/bookings'], { queryParams: { tab: 'completed' } })"
        class="text-left bg-white dark:bg-gray-800/50 rounded-xl p-4 sm:p-5 border border-gray-200 dark:border-gray-700 flex items-start gap-3 sm:gap-4 hover:shadow-md hover:-translate-y-0.5 transition-all"
      >
        <div class="p-2 sm:p-3 rounded-full bg-green-500/10 text-green-500 flex-shrink-0">
          <span class="material-symbols-outlined text-lg sm:text-xl">task_alt</span>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">
            Completed Jobs
          </p>
          <p class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">
            {{ loading ? '...' : stats.completed }}
          </p>
        </div>
      </button>
      <button
        type="button"
        (click)="router.navigate(['/client/bookings'], { queryParams: { tab: 'pendingReviews' } })"
        class="text-left bg-white dark:bg-gray-800/50 rounded-xl p-4 sm:p-5 border border-gray-200 dark:border-gray-700 flex items-start gap-3 sm:gap-4 hover:shadow-md hover:-translate-y-0.5 transition-all"
      >
        <div class="p-2 sm:p-3 rounded-full bg-yellow-500/10 text-yellow-500 flex-shrink-0">
          <span class="material-symbols-outlined text-lg sm:text-xl">pending_actions</span>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">
            Pending Reviews
          </p>
          <p class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">
            {{ loading ? '...' : stats.pendingReviews }}
          </p>
        </div>
      </button>

    </div>
  </section>

  <section>
    <h2 class="text-base sm:text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">
      Recommended Staff
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
      <div *ngIf="loading" class="col-span-full text-center py-8 text-gray-500">Loading...</div>
      <div *ngIf="!loading && error" class="col-span-full text-center py-8 text-red-500 hidden">{{ error }}</div>
      <ng-container *ngIf="!loading && !error">
        <ng-container *ngIf="recommendedStaff.length > 0; else noStaff">
          <div *ngFor="let member of recommendedStaff" class="bg-white dark:bg-gray-800/50 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden group hover:shadow-lg hover:-translate-y-1 transition-all">
            <img
              [alt]="member.name"
              [src]="member.image_url || 'https://via.placeholder.com/400x240'"
              class="w-full h-32 sm:h-40 object-cover"
            />
            <div class="p-3 sm:p-4">
              <h3 class="font-semibold text-sm sm:text-base text-gray-900 dark:text-white truncate">
                {{ member.name }}
              </h3>
              <p class="text-xs sm:text-sm text-primary font-medium truncate">{{ member.role }}</p>
              <div class="flex items-center gap-1 text-yellow-500 mt-2">
                <span
                  class="material-symbols-outlined !text-sm sm:!text-base !leading-none"
                  style="font-variation-settings: 'FILL' 1"
                >
                  star
                </span>
                <span class="text-xs sm:text-sm text-gray-600 dark:text-gray-300 font-medium">
                  {{ formatRating(member.rating) }}
                  <span class="text-gray-400 font-normal">
                    ({{ member.rating_count || 0 }})
                  </span>
                </span>
              </div>
              <button
                type="button"
                (click)="router.navigate(['/client/staff', member.id])"
                class="w-full mt-3 sm:mt-4 flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-8 sm:h-9 px-3 sm:px-4 bg-primary/10 text-primary text-xs sm:text-sm font-bold hover:bg-primary/20 transition-colors whitespace-nowrap"
              >
                <span>View Profile</span>
              </button>
            </div>
          </div>
        </ng-container>
        <ng-template #noStaff>
          <div class="col-span-full text-center py-8 text-gray-500">No staff available</div>
        </ng-template>
      </ng-container>
    </div>
  </section>

  <section>
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
      <h2 class="text-base sm:text-lg font-semibold text-gray-800 dark:text-gray-200">
        Browse Staff Categories
      </h2>
      <form (ngSubmit)="handleSearch($event)" class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
        <div class="relative w-full sm:w-64">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">
            search
          </span>
          <input
            type="text"
            [(ngModel)]="searchQuery"
            name="searchQuery"
            placeholder="Search categories..."
            class="w-full pl-10 pr-4 py-2 text-sm border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-900 focus:ring-primary focus:border-primary"
          />
        </div>
        <button
          type="button"
          (click)="handleFiltersClick()"
          class="flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-900 text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors whitespace-nowrap"
        >
          <span class="material-symbols-outlined !text-xl">filter_list</span>
          <span>Filters</span>
        </button>
      </form>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
      <button type="button" (click)="handleCategoryClick('Event Staff')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          celebration
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Event Staff</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Hospitality')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          restaurant
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Hospitality</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('General Labor')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          engineering
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">General Labor</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Administrative')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          edit_note
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Administrative</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Warehouse')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          local_shipping
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Warehouse</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Retail')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          store
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Retail</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Delivery')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          delivery_dining
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Delivery</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Cleaning')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          cleaning_services
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Cleaning</h4>
      </button>
      <button type="button" (click)="handleCategoryClick('Construction')" class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary transition-all cursor-pointer hover:shadow-lg hover:-translate-y-1">
        <span class="material-symbols-outlined text-2xl sm:text-3xl text-gray-600 dark:text-gray-400 group-hover:text-primary transition-colors">
          construction
        </span>
        <h4 class="text-xs sm:text-sm font-semibold">Construction</h4>
      </button>
      <button
        type="button"
        (click)="router.navigate(['/client/browse-staff'])"
        class="group flex flex-col items-center justify-center text-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl bg-primary/10 border border-primary/20 text-primary dark:bg-primary/20 dark:border-primary/30 hover:shadow-lg hover:-translate-y-1 transition-all"
      >
        <span class="material-symbols-outlined text-2xl sm:text-3xl">add</span>
        <h4 class="text-xs sm:text-sm font-semibold">View All</h4>
      </button>
    </div>
  </section>
</main>
