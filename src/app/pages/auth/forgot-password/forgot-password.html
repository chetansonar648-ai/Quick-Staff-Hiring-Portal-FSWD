<div class="page" style="max-width: 420px;">
  <div class="card grid" style="gap: 16px;">
    <h2>Forgot password</h2>
    <p>Enter your email to receive reset instructions.</p>
    <form class="grid" style="gap: 12px;" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          name="email"
          type="email"
          placeholder="you@example.com"
          [(ngModel)]="form.email"
        />
        <span class="error" *ngIf="errors.email">{{ errors.email }}</span>
      </div>
      <button class="btn" type="submit">Send reset link</button>
    </form>
    <div class="card" style="background: #e7f3ff;" *ngIf="sent">Check your inbox for the link.</div>
  </div>
</div>
