<div class="page" style="max-width: 1100px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: center;">
    <div class="card" style="border: 1px solid #e5e8ef; background: #fff;">
      <h2 style="font-size: 30px; margin: 0 0 8px;">Create Your Client Account</h2>
      <p style="color: #617c89; margin-top: 0;">Sign up to post jobs and hire top talent instantly.</p>
      <form class="grid" style="gap: 12px; margin-top: 16px;" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Full Name</label>
          <input name="name" placeholder="Enter your full name" [(ngModel)]="form.name" />
          <span class="error" *ngIf="errors.name">{{ errors.name }}</span>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input
            name="email"
            type="email"
            placeholder="Enter your email"
            [(ngModel)]="form.email"
          />
          <span class="error" *ngIf="errors.email">{{ errors.email }}</span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            name="password"
            type="password"
            placeholder="Create a password"
            [(ngModel)]="form.password"
          />
          <span class="error" *ngIf="errors.password">{{ errors.password }}</span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input
            name="confirm"
            type="password"
            placeholder="Confirm password"
            [(ngModel)]="form.confirm"
          />
          <span class="error" *ngIf="errors.confirm">{{ errors.confirm }}</span>
        </div>
        <label style="display: flex; gap: 8px; align-items: flex-start; font-size: 14px; color: #617c89;">
          <input type="checkbox" style="width: 16px; height: 16px; margin-top: 2px;" />
          I agree to the <a href="#" style="color: #005a9c; font-weight: 700;">Terms</a> and
          <a href="#" style="color: #005a9c; font-weight: 700;">Privacy Policy</a>.
        </label>
        <div class="error" *ngIf="serverError">{{ serverError }}</div>
        <button class="btn" type="submit">Create Client Account</button>
      </form>
      <p style="color: #617c89; margin-top: 12px;">
        Already have an account?
        <a routerLink="/login" style="color: #005a9c; font-weight: 700;">Login here</a>
      </p>
    </div>

    <div class="card" style="background: #f4f7f9; border: 1px solid #e5e8ef;">
      <div
        style="aspect-ratio: 1/1; background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuA6SSv1L28FFGZMWp9VGeMlQf53dPJ6CvAm7VKfiZLM7tZ1B-U_Wuq6nOOtuwRjX-t6RgqHe30FEbgzm6iHDztGLJDc-6v93cZLHrGWj7l9TsQ7NI8HCBCTxQFioktA1TrwdFQh0KjTHQzmi_YEJNZb1l94ltNh_0oYuergT8rR97s46LuVcoXWTEA4Po1Gc8PgM8Q3AmKpLm6djjc98NYZrSbxZ2OlN5SeVYBBxksXVhNVWT00QyCV6MEun_IGhfEbw1d8ekfovg); background-size: cover; background-position: center; border-radius: 12px; margin-bottom: 16px;"
      ></div>
      <h3 style="margin: 0; font-size: 24px; font-weight: 900;">Find skilled gig workers, fast.</h3>
      <p style="color: #617c89; margin-top: 8px;">Your on-demand workforce awaits.</p>
    </div>
  </div>
</div>
