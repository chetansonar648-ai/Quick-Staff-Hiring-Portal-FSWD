<div class="page" style="max-width: 420px;">
  <div class="card grid" style="gap: 16px;">
    <h2>Reset password</h2>
    <form class="grid" style="gap: 12px;" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>New password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••"
          [(ngModel)]="form.password"
        />
        <span class="error" *ngIf="errors.password">{{ errors.password }}</span>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input
          type="password"
          name="confirm"
          placeholder="••••••"
          [(ngModel)]="form.confirm"
        />
        <span class="error" *ngIf="errors.confirm">{{ errors.confirm }}</span>
      </div>
      <button class="btn" type="submit">Update password</button>
    </form>
    <div class="card" style="background: #e7f3ff;" *ngIf="done">Password updated.</div>
  </div>
</div>
