<div class="page" style="max-width: 520px;">
  <div class="card" style="border: 1px solid #e5e8ef;">
    <h2 style="margin-top: 0;">Verify Your Email</h2>
    <p style="color: #617c89;">Enter your email to receive a verification code.</p>
    <form class="grid" style="gap: 12px; margin-top: 12px;" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          [(ngModel)]="form.email"
        />
        <span class="error" *ngIf="errors.email">{{ errors.email }}</span>
      </div>

      <div class="form-group" *ngIf="step === 2">
        <label>Verification Code</label>
        <input
          maxLength="6"
          name="otp"
          placeholder="Enter 6-digit code"
          [(ngModel)]="form.otp"
        />
        <span class="error" *ngIf="errors.otp">{{ errors.otp }}</span>
      </div>

      <div class="error" *ngIf="serverError">{{ serverError }}</div>
      <button class="btn" type="submit">{{ step === 1 ? 'Send OTP' : 'Verify OTP' }}</button>
    </form>

    <div class="card" style="background: #e7f3ff; margin-top: 12px;" *ngIf="message">
      {{ message }}
    </div>
  </div>
</div>
