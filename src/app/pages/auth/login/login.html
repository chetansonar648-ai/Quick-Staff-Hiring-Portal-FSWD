<div class="page" style="max-width: 420px;">
  <div class="card grid" style="gap: 16px;">
    <h2>Login</h2>
    <form class="grid" style="gap: 12px;" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          placeholder="you@example.com"
          [(ngModel)]="form.email"
        />
        <span class="error" *ngIf="errors.email">{{ errors.email }}</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••"
          [(ngModel)]="form.password"
        />
        <span class="error" *ngIf="errors.password">{{ errors.password }}</span>
      </div>
      <div class="error" *ngIf="serverError">{{ serverError }}</div>
      <button class="btn" type="submit">Sign in</button>
    </form>
    <div style="display: flex; justify-content: space-between;">
      <a routerLink="/forgot-password">Forgot password?</a>
      <a routerLink="/register">Create account</a>
    </div>
  </div>
</div>
