<div class="flex min-h-screen">
  <!-- Left Side -->
  <div class="hidden lg:flex w-1/2 items-center justify-center bg-blue-600 text-white">
    <div class="p-10">
      <h1 class="text-4xl font-bold">Quick Staff</h1>
      <p class="mt-4">Connecting Talent. Powering Business.</p>
    </div>
  </div>

  <!-- Right Side -->
  <div class="flex w-full lg:w-1/2 items-center justify-center p-6">
    <form (ngSubmit)="onSubmit()" class="w-full max-w-md space-y-4">

      <h2 class="text-2xl font-bold">Welcome Back</h2>

      <!-- Email -->
      <input
        type="text"
        placeholder="Email"
        [(ngModel)]="form.email"
        name="email"
        class="w-full border p-2 rounded"
        required
      />

      <!-- Password -->
      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Password"
        [(ngModel)]="form.password"
        name="password"
        class="w-full border p-2 rounded"
        required
      />

      <!-- Error -->
      <div *ngIf="error" class="text-red-500">
        {{ error }}
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-600 text-white p-2 rounded"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>
  </div>
</div>
