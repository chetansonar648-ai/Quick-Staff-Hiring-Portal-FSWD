<div class="clients-page">
  <div class="page-header">
    <h2>Client Management</h2>
    <p>Manage client records, contacts, and spend</p>
  </div>

  <div class="clients-toolbar">
    <div class="search-box">
      <input
        type="text"
        placeholder="Search clients..."
        [(ngModel)]="searchTerm"
      />
      <span class="search-icon">🔍</span>
    </div>
    <button class="add-btn" (click)="handleAddClient()">+ Add Client</button>
  </div>

  <div class="clients-table-container">
    <div *ngIf="loading" class="no-results"><p>Loading clients...</p></div>
    <div *ngIf="error && !loading" class="no-results"><p>{{ error }}</p></div>

    <table *ngIf="!loading && !error" class="clients-table">
      <thead>
        <tr>
          <th>Client</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Bookings</th>
          <th>Total Spent</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of filtered">
          <td>{{ c.name }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.phone }}</td>
          <td>
            <span
              [ngClass]="'status-badge status-' + c.status.toLowerCase()"
              (click)="toggleClientStatus(c)"
              [style.cursor]="'pointer'"
              title="Click to toggle status"
            >
              {{ c.status }}
            </span>
          </td>
          <td>{{ c.bookings }}</td>
          <td class="amount-cell">{{ c.spent }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ADD CLIENT MODAL -->
  <div *ngIf="showAddModal" class="modal-overlay" (click)="showAddModal = false">
    <div class="modal-content" (click)="stopPropagation($event)">
      <div class="modal-header">
        <h3>Add Client</h3>
        <button class="close-btn" (click)="showAddModal = false">×</button>
      </div>

      <form class="modal-form" (ngSubmit)="submitClient($event)">
        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="form.name" name="name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" name="email" required />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="form.phone" name="phone" />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" [(ngModel)]="form.address" name="address" />
        </div>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="showAddModal = false">Cancel</button>
          <button type="submit" class="submit-btn" [disabled]="saving">{{ saving ? 'Saving…' : 'Save' }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
