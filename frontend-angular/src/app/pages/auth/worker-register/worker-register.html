<div class="bg-background-light min-h-screen flex flex-col">
  <header class="flex items-center justify-between px-6 py-3">
    <div class="flex items-center gap-3">
      <div class="size-6 text-primary">
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path
            clip-rule="evenodd"
            d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z"
            fill="currentColor"
            fill-rule="evenodd"
          ></path>
        </svg>
      </div>
      <h2 class="text-lg font-bold">Quick Staff</h2>
    </div>
    <a
      routerLink="/login"
      class="flex min-w-[84px] items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold hover:bg-primary/90"
    >
      Login
    </a>
  </header>
  <main class="flex-1 flex flex-col items-center px-4 py-10">
    <div class="text-center mb-8">
      <p class="text-3xl font-black">Register as Gig Worker</p>
      <p class="text-subtle-light">Showcase your skills and get hired fast.</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="w-full max-w-3xl bg-white border border-gray-200 rounded-xl p-8 space-y-4">
      <div class="grid md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Full Name</label>
          <input
            name="name"
            required
            [(ngModel)]="form.name"
            class="h-11 rounded-lg border border-border-light px-3"
            placeholder="Jane Doe"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Email</label>
          <input
            name="email"
            type="email"
            required
            [(ngModel)]="form.email"
            class="h-11 rounded-lg border border-border-light px-3"
            placeholder="you@example.com"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Password</label>
          <div class="relative">
            <input
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              required
              [(ngModel)]="form.password"
              class="h-11 w-full rounded-lg border border-border-light px-3 pr-10"
              placeholder="Create a strong password"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"
            >
              <span class="material-symbols-outlined text-base">visibility</span>
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Confirm Password</label>
          <div class="relative">
            <input
              name="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              required
              [(ngModel)]="form.confirmPassword"
              class="h-11 w-full rounded-lg border border-border-light px-3 pr-10"
              placeholder="Repeat your password"
            />
            <button
              type="button"
              (click)="toggleConfirmPassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"
            >
              <span class="material-symbols-outlined text-base">visibility</span>
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Phone</label>
          <input
            name="phone"
            [(ngModel)]="form.phone"
            class="h-11 rounded-lg border border-border-light px-3"
            placeholder="(555) 555-5555"
          />
        </div>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Address</label>
        <textarea
          name="address"
          [(ngModel)]="form.address"
          class="rounded-lg border border-border-light px-3 py-2"
          placeholder="Street, City, State"
        ></textarea>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Skills (comma separated)</label>
          <input
            name="skills"
            [(ngModel)]="form.skills"
            class="h-11 rounded-lg border border-border-light px-3"
            placeholder="Bartending, Warehouse"
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Hourly Rate (USD)</label>
          <input
            name="hourly_rate"
            [(ngModel)]="form.hourly_rate"
            class="h-11 rounded-lg border border-border-light px-3"
            placeholder="25"
          />
        </div>
      </div>
      <div class="flex items-start gap-x-2">
        <input
          type="checkbox"
          name="terms"
          [(ngModel)]="form.terms"
          class="h-4 w-4 rounded border-border-light bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-1 focus:ring-offset-1 focus:ring-primary mt-0.5"
          required
        />
        <label class="text-sm font-normal text-text-light dark:text-text-dark">
          I agree to the <a class="font-medium text-primary hover:underline" routerLink="/terms">Terms &amp; Conditions</a> and
          <a class="font-medium text-primary hover:underline" routerLink="/privacy-policy">Privacy Policy</a>.
        </label>
      </div>
      <div *ngIf="error" class="text-sm text-red-600">{{ error }}</div>
      <button
        type="submit"
        [disabled]="loading"
        class="h-12 w-full bg-primary text-white rounded-lg font-bold hover:bg-primary/90"
      >
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>
  </main>

  <!-- Success Modal -->
  <div *ngIf="showSuccess" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-4xl text-green-600">check_circle</span>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Registration Successful!</h2>
      <p class="text-gray-600 mb-6">Your account has been created successfully. You will be redirected to the login page shortly.</p>
      <button
        type="button"
        (click)="handleSuccessClose()"
        class="h-12 w-full bg-primary text-white rounded-lg font-bold hover:bg-primary/90 transition-colors"
      >
        OK
      </button>
    </div>
  </div>
</div>
