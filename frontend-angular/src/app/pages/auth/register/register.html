<div class="page" style="max-width: 520px;">
  <div class="card grid" style="gap: 16px;">
    <h2>Create your account</h2>
    <form class="grid" style="gap: 12px;" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full name</label>
        <input name="name" placeholder="Jane Doe" [(ngModel)]="form.name" />
        <span class="error" *ngIf="errors.name">{{ errors.name }}</span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input
          name="email"
          type="email"
          [(ngModel)]="form.email"
          placeholder="you@example.com"
        />
        <span class="error" *ngIf="errors.email">{{ errors.email }}</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          name="password"
          type="password"
          [(ngModel)]="form.password"
          placeholder="••••••"
        />
        <span class="error" *ngIf="errors.password">{{ errors.password }}</span>
      </div>
      <div class="form-group">
        <label>I am a</label>
        <select name="role" [(ngModel)]="form.role">
          <option value="worker">Worker</option>
          <option value="client">Client</option>
        </select>
        <span class="error" *ngIf="errors.role">{{ errors.role }}</span>
      </div>
      <div class="error" *ngIf="serverError">{{ serverError }}</div>
      <button class="btn" type="submit" [disabled]="loading">{{ loading ? 'Please wait…' : 'Create account' }}</button>
    </form>
    <a routerLink="/login">Already have an account? Sign in</a>
  </div>
</div>
