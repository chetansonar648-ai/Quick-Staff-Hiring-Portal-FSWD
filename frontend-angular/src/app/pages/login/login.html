<div class="font-display bg-[#f5f7f8] dark:bg-[#101922] text-[#111418] dark:text-[#f5f7f8]">
  <div class="relative flex min-h-screen w-full flex-col group/design-root">
    <div class="flex h-full grow flex-col">
      <div class="flex flex-1">
        <div class="flex w-full flex-col lg:flex-row">

          <!-- LEFT SIDE -->
          <div 
            class="relative hidden w-full flex-col items-center justify-center bg-cover bg-center lg:flex lg:w-1/2"
            style="background-image: url('/assets/login-bg.jpg')"
          >
            <div class="absolute inset-0 bg-[#0d7ff2]/80"></div>

            <div class="relative z-10 flex flex-col items-start gap-6 p-12 text-white max-w-md">
              <a routerLink="/" class="text-3xl font-bold">Quick Staff</a>
              <h1 class="text-4xl font-black leading-tight tracking-tight">
                Connecting Talent. Powering Business.
              </h1>
              <p class="text-lg font-normal leading-relaxed opacity-90">
                Log in to access your dashboard, manage your team, and find your next opportunity with Quick Staff.
              </p>
            </div>
          </div>

          <!-- RIGHT SIDE -->
          <div class="flex w-full items-center justify-center bg-[#f5f7f8] dark:bg-[#101922] p-6 sm:p-8 lg:w-1/2">
            <div class="flex w-full max-w-md flex-col gap-8 py-10">

              <!-- HEADER -->
              <div class="flex flex-col gap-2 text-center lg:text-left">
                <h1 class="text-3xl font-bold text-[#111418] dark:text-[#f5f7f8]">
                  Welcome Back
                </h1>
                <p class="text-[#60758a] dark:text-[#a0b0c0]">
                  Log in to access your Quick Staff account.
                </p>
              </div>

              <!-- FORM -->
              <form class="flex w-full flex-col gap-6" [formGroup]="form" (ngSubmit)="onSubmit()">

                <!-- EMAIL -->
                <label class="flex flex-col w-full">
                  <p class="text-sm font-medium pb-2 text-[#111418] dark:text-[#f5f7f8]">
                    Email or Username
                  </p>

                  <div class="flex w-full flex-1 items-stretch rounded-lg">
                    <div class="flex items-center justify-center pl-4 pr-3 border border-r-0 border-[#dbe0e6] dark:border-[#344150] rounded-l-lg bg-white dark:bg-[#101922]">
                      <span class="material-symbols-outlined text-[#60758a] dark:text-[#a0b0c0] text-base">
                        person
                      </span>
                    </div>

                    <input
                      name="email"
                      class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg text-[#111418] dark:text-[#f5f7f8] focus:outline-0 focus:ring-2 focus:ring-[#0d7ff2]/50 border border-[#dbe0e6] dark:border-[#344150] bg-white dark:bg-[#101922] h-12 placeholder:text-[#60758a] dark:placeholder:text-[#a0b0c0] px-3 text-base font-normal leading-normal border-l-0"
                      placeholder="e.g., yourname@example.com"
                      formControlName="email"
                      required
                    />
                  </div>
                  <p *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']" class="text-sm text-red-600 mt-2">Email is required</p>
                  <p *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']" class="text-sm text-red-600 mt-2">Enter a valid email</p>
                </label>

                <!-- PASSWORD -->
                <label class="flex flex-col w-full">
                  <p class="text-sm font-medium pb-2 text-[#111418] dark:text-[#f5f7f8]">
                    Password
                  </p>

                  <div class="flex w-full flex-1 items-stretch rounded-lg">
                    <div class="flex items-center justify-center pl-4 pr-3 border border-r-0 border-[#dbe0e6] dark:border-[#344150] rounded-l-lg bg-white dark:bg-[#101922]">
                      <span class="material-symbols-outlined text-[#60758a] dark:text-[#a0b0c0] text-base">
                        lock
                      </span>
                    </div>

                    <input
                      name="password"
                      [type]="showPassword ? 'text' : 'password'"
                      class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-[#111418] dark:text-[#f5f7f8] focus:outline-0 focus:ring-2 focus:ring-[#0d7ff2]/50 border border-[#dbe0e6] dark:border-[#344150] bg-white dark:bg-[#101922] h-12 placeholder:text-[#60758a] dark:placeholder:text-[#a0b0c0] px-3 text-base font-normal leading-normal border-l-0 border-r-0"
                      placeholder="Enter your password"
                      formControlName="password"
                      required
                    />

                    <div
                      class="flex items-center justify-center pr-4 pl-3 border border-l-0 border-[#dbe0e6] dark:border-[#344150] rounded-r-lg bg-white dark:bg-[#101922] cursor-pointer"
                      (click)="showPassword = !showPassword"
                    >
                      <span class="material-symbols-outlined text-[#60758a] dark:text-[#a0b0c0] text-base">
                        visibility
                      </span>
                    </div>
                  </div>
                  <p *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']" class="text-sm text-red-600 mt-2">Password is required</p>
                </label>

                <!-- ERROR -->
                <div *ngIf="error" class="text-sm text-red-600">
                  {{ error }}
                </div>

                <!-- FORGOT PASSWORD -->
                <div class="flex flex-wrap items-center justify-end gap-4">
                  <a routerLink="/forgot-password" class="text-sm font-medium text-[#0d7ff2] hover:underline">
                    Forgot Password?
                  </a>
                </div>

                <!-- BUTTON -->
                <div class="flex flex-col gap-4">
                  <button
                    type="submit"
                    [disabled]="loading"
                    class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-[#0d7ff2] text-white text-base font-bold leading-normal tracking-wide hover:bg-[#0d7ff2]/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#f5f7f8] dark:focus:ring-offset-[#101922] focus:ring-[#0d7ff2] transition-colors duration-200"
                  >
                    <span class="truncate">
                      {{ loading ? 'Logging in...' : 'Log In' }}
                    </span>
                  </button>

                  <p class="text-center text-sm text-[#60758a] dark:text-[#a0b0c0]">
                    New to Quick Staff?
                    <a routerLink="/register" class="font-bold text-[#0d7ff2] hover:underline">
                      Create an account
                    </a>
                  </p>
                </div>

              </form>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
