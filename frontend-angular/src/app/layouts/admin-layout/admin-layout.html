<div [ngClass]="'dashboard-container ' + (sidebarOpen ? '' : 'sidebar-closed')">
  <aside [ngClass]="'sidebar ' + (sidebarOpen ? 'open' : 'closed')">
    <div class="sidebar-header">
      <h2>Admin Panel</h2>
      <button
        class="toggle-btn"
        (click)="sidebarOpen = !sidebarOpen"
      >
        {{ sidebarOpen ? '◀' : '▶' }}
      </button>
    </div>
    <nav class="sidebar-nav">
      <a
        *ngFor="let item of (menuItems || [])"
        [routerLink]="item.path || '/'"
        [ngClass]="'nav-item ' + (isActive(item.path) ? 'active' : '')"
      >
        <span class="nav-icon">{{ item.icon || '📄' }}</span>
        <span *ngIf="sidebarOpen" class="nav-label">{{ item.label || 'Menu' }}</span>
      </a>

    </nav>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <h1>Admin Dashboard</h1>
      <div class="header-actions">
        <button type="button" class="user-info user-info-link" routerLink="/admin/settings">
          👤 {{ headerDisplayName }}
        </button>
      </div>
    </header>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
