<div class="relative flex h-screen w-full overflow-hidden">
  <aside class="fixed left-0 top-0 z-30 h-full w-64 flex-shrink-0 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col">
      <div class="flex items-center gap-4 text-gray-900 dark:text-white px-6 h-16 border-b border-gray-200 dark:border-gray-800">
        <div class="size-6 text-primary">
          <span class="material-symbols-outlined text-3xl">hub</span>
        </div>
        <h2 class="text-lg font-bold tracking-tight">Quick Staff</h2>
      </div>
      <nav class="flex-grow p-4">
        <ul class="space-y-2">
          <li>
            <a
              routerLink="/client"
              [ngClass]="navLinkBase + (isActive('/', true) ? ' bg-primary/10 text-primary font-semibold' : '')"
            >
              <span class="material-symbols-outlined">dashboard</span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/client/browse-staff"
              [ngClass]="navLinkBase + (isActive('/browse-staff') ? ' bg-primary/10 text-primary font-semibold' : '')"
            >
              <span class="material-symbols-outlined">search</span>
              <span>Browse Staff</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/client/bookings"
              [ngClass]="navLinkBase + (isActive('/bookings') ? ' bg-primary/10 text-primary font-semibold' : '')"
            >
              <span class="material-symbols-outlined">calendar_month</span>
              <span>My Bookings</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/client/saved-workers"
              [ngClass]="navLinkBase + (isActive('/saved-workers') ? ' bg-primary/10 text-primary font-semibold' : '')"
            >
              <span class="material-symbols-outlined">bookmark</span>
              <span>Saved Workers</span>
            </a>
          </li>

          <li>
            <a
              routerLink="/client/profile"
              [ngClass]="navLinkBase + (isActive('/profile') ? ' bg-primary/10 text-primary font-semibold' : '')"
            >
              <span class="material-symbols-outlined">person</span>
              <span>My Profile</span>
            </a>
          </li>
        </ul>
      </nav>
      <div class="p-4 border-t border-gray-200 dark:border-gray-800">
        <button
          type="button"
          (click)="logout()"
          class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/50 font-medium"
        >
          <span class="material-symbols-outlined">logout</span>
          <span>Logout</span>
        </button>
      </div>
  </aside>

  <div class="ml-64 flex flex-1 flex-col min-h-screen max-w-full overflow-hidden">
      <header class="flex-shrink-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center justify-between h-16 px-6">
          <div class="flex items-center">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
          </div>
          <div class="flex items-center gap-6">
            <div
              class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 p-2 rounded-lg transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-700"
              (click)="router.navigate(['/client/profile'])"
            >
              <img
                alt="Client Avatar"
                class="size-9 rounded-full object-cover border border-gray-200 dark:border-gray-700 bg-gray-100"
                [src]="user.image"
              />
              <div>
                <p class="text-sm font-semibold text-gray-900 dark:text-white">{{ user.name }}</p>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 w-full max-w-full overflow-y-auto overflow-x-hidden">
        <router-outlet></router-outlet>
      </main>
  </div>
</div>
